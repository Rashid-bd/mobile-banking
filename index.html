<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo Mobile Banking</title>
    <!-- daisy ui cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <!-- Tailwind cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="flex flex-col justify-center items-center bg-[#F4F5F7] min-h-screen">
    <div class="h-[100px] w-full max-w-[260px] bg-[url(./assets/bg.png)] bg-cover flex justify-center items-center mx-auto mb-4">
      <img src="./assets/Group.png" alt="" />
    </div>
    <form class="w-full max-w-[320px] bg-white border-base-300 rounded-2xl border p-6">
      <label for="mobile-number" class="text-sm font-medium mb-1 block">Mobile Number</label>
      <input
        type="tel"
        maxlength="11"
        id="mobile-number"
        class="input w-full text-sm border-none rounded-3xl bg-[#F4F5F7] mb-3 focus:outline-none focus:ring-2 focus:ring-blue-400"
        placeholder="Enter your number"
      />

      <label for="pin-number" class="text-sm font-medium mb-1 block">4 Digit Pin</label>
      <input
        type="password"
        maxlength="4"
        id="pin-number"
        class="input w-full border-none rounded-3xl bg-[#F4F5F7] text-center tracking-widest mb-3 focus:outline-none focus:ring-2 focus:ring-blue-400"
        placeholder="••••"
      />

      <p id="error-message" class="text-red-500 text-sm mb-2 hidden">Invalid input</p>

      <button
        type="button"
        id="login-btn"
        class="btn w-full text-sm border-none rounded-3xl text-white bg-[#0874F2] mt-3 hover:bg-blue-700 transition-all duration-300 ease-in-out"
      >
        Login
      </button>
    </form>

    <!-- js scripts -->
    <script src="./scripts/app.js"></script>
  </body>
</html>
